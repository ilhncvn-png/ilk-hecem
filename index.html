<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>İlk Hecem Anaokulu — Mutlu Çocuklar, Aydınlık Yarınlar</title>
<meta name="description" content="Tuzla'da sevgi dolu, güvenli ve oyun temelli özel anaokulu. 2–6 yaş, 8 branş dersi, deneyimli öğretmenler. WhatsApp'tan bilgi alın!" />

<!-- Open Graph / WhatsApp / Facebook -->
<meta property="og:type" content="website" />
<meta property="og:url" content="https://ilhncvn-png.github.io/ilk-hecem/" />
<meta property="og:title" content="İlk Hecem Anaokulu — Mutlu Çocuklar, Aydınlık Yarınlar" />
<meta property="og:description" content="Tuzla'da sevgi dolu, güvenli ve oyun temelli özel anaokulu. 2–6 yaş, 8 branş dersi, deneyimli öğretmenler. WhatsApp'tan bilgi alın!" />
<meta property="og:image" content="https://ilhncvn-png.github.io/ilk-hecem/assets/photo-mutlu-cocuklar.webp" />
<meta property="og:locale" content="tr_TR" />
<meta property="og:site_name" content="İlk Hecem Anaokulu" />

<!-- Twitter / iMessage -->
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="İlk Hecem Anaokulu — Mutlu Çocuklar, Aydınlık Yarınlar" />
<meta name="twitter:description" content="Tuzla'da sevgi dolu, güvenli ve oyun temelli özel anaokulu. 2–6 yaş, 8 branş dersi, deneyimli öğretmenler." />
<meta name="twitter:image" content="https://ilhncvn-png.github.io/ilk-hecem/assets/photo-mutlu-cocuklar.webp" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Nunito:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" />
<link rel="stylesheet" href="styles.css" />
<style>
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; overflow-x: hidden; }
  body { margin: 0; background: var(--surface-page); font-family: var(--font-body); color: var(--text-body);
         -webkit-font-smoothing: antialiased; overflow-x: hidden; width: 100%; position: relative; }
  a { -webkit-tap-highlight-color: transparent; }

  /* ── TABLET (≤ 980px) ── */
  @media (max-width: 980px) {
    .ih-hero-grid, .ih-2col { grid-template-columns: 1fr !important; }
    .ih-hero-art { min-height: 320px !important; margin-top: 16px; }
    .ih-grid-4 { grid-template-columns: repeat(2, 1fr) !important; }
    .ih-grid-3 { grid-template-columns: 1fr !important; }
    .ih-gallery { grid-template-columns: repeat(2, 1fr) !important; }
    .ih-footer-grid { grid-template-columns: 1fr !important; }
  }
  @media (max-width: 760px) {
    .ih-desktop-nav { display: none !important; }
    .ih-mobile-toggle { display: inline-flex !important; }
  }

  /* ── MOBİL KOMPLE DÜZENLEME (≤ 640px) ── */
  @media (max-width: 640px) {

    /* 1. TİPOGRAFİ */
    :root {
      --fs-hero:    1.72rem;
      --fs-display: 1.42rem;
      --fs-h2:      1.28rem;
      --fs-h3:      1.05rem;
      --fs-h4:      1rem;
      --fs-lead:    0.9375rem;
      --section-y:  40px;
      --gutter:     16px;
    }

    /* ── 2. HERO — zengin görsel, kompakt ── */
    #top {
      padding-top: 88px !important;
      padding-bottom: 32px !important;
    }
    .ih-hero-grid {
      grid-template-columns: 1fr !important;
      gap: 18px !important;
    }

    /* Ambient süslemeler gizle */
    #top > span[aria-hidden="true"] { display: none !important; }

    /* Badge: daha sıkı */
    #top [style*="marginBottom: 20"] { margin-bottom: 10px !important; }

    /* Lead: max-width kaldır */
    #top p { max-width: 100% !important; margin-top: 8px !important; }

    /* CTA butonları: yan yana, kompakt */
    .ih-hero-ctas {
      flex-wrap: nowrap !important;
      gap: 8px !important;
      margin-top: 16px !important;
    }
    .ih-hero-ctas > * {
      flex: 1 1 0 !important;
      min-width: 0 !important;
      justify-content: center !important;
      padding-left: 10px !important;
      padding-right: 10px !important;
      font-size: 0.82rem !important;
    }
    /* İkon boyutu buton içinde */
    .ih-hero-ctas > * > span[style] {
      width: 16px !important;
      height: 16px !important;
    }

    /* Güven rozetleri: tek satırda, kaydırılabilir */
    .ih-hero-trust {
      flex-wrap: nowrap !important;
      overflow-x: auto !important;
      gap: 10px !important;
      margin-top: 12px !important;
      padding-bottom: 2px !important;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .ih-hero-trust::-webkit-scrollbar { display: none; }
    .ih-hero-trust > span {
      white-space: nowrap !important;
      font-size: 0.78rem !important;
      gap: 5px !important;
      flex-shrink: 0 !important;
    }
    .ih-trust-icon {
      width: 15px !important;
      height: 15px !important;
    }

    /* Hero fotoğraf collage: görsel olarak zengin, sınırlar içinde */
    .ih-hero-art {
      min-height: 220px !important;
      height: 220px !important;
      border-radius: var(--radius-xl) !important;
      overflow: hidden !important;
      margin-top: 0 !important;
    }

    /* Ana fotoğraf: döndürme yok, tam doldur */
    .ih-hero-art > div:first-child {
      border-radius: 0 !important;
      transform: none !important;
    }

    /* Küçük atölye fotoğrafı (sağ alt): gizle */
    .ih-hero-art > div:nth-child(2) { display: none !important; }

    /* "120+ mutlu minik" kartı: sol alta yerleştir, sınırlar içinde */
    .ih-hero-art > div:nth-child(3) {
      left: 10px !important;
      bottom: 10px !important;
      top: auto !important;
      padding: 8px 12px !important;
      gap: 8px !important;
      animation: none !important;
    }
    .ih-hero-art > div:nth-child(3) > span {
      width: 30px !important;
      height: 30px !important;
    }
    .ih-hero-art > div:nth-child(3) > span > span {
      width: 17px !important;
      height: 17px !important;
    }
    .ih-hero-art > div:nth-child(3) > div > div:first-child {
      font-size: 14px !important;
    }
    .ih-hero-art > div:nth-child(3) > div > div:last-child {
      font-size: 11px !important;
    }

    /* Logo: sağ üste yerleştir, sınırlar içinde, küçük */
    .ih-hero-art > img {
      width: 68px !important;
      right: 10px !important;
      top: 8px !important;
      bottom: auto !important;
    }

    /* ── 3. HAKKIMIZDA ── */
    #hakkimizda .ih-2col { gap: 20px !important; }
    #hakkimizda .ih-2col > div:first-child > div:first-child {
      aspect-ratio: 4/3 !important;
    }
    #hakkimizda .ih-2col > div:first-child > div:nth-child(2) { display: none !important; }
    #hakkimizda [style*="grid-template-columns: 1fr 1fr"] {
      gap: 10px !important;
      margin-top: 18px !important;
    }
    #hakkimizda [style*="padding: 18px"] { padding: 12px !important; }
    #hakkimizda [style*="font-size: 22px"] { font-size: 18px !important; }

    /* ── 4. EĞİTİM ANLAYIŞI ── */
    #anlayis span[aria-hidden="true"] { display: none !important; }
    #anlayis .ih-grid-4 {
      grid-template-columns: repeat(2, 1fr) !important;
      gap: 14px !important;
      margin-top: 24px !important;
    }
    #anlayis .ih-grid-4 > div > span:first-child {
      width: 58px !important;
      height: 58px !important;
    }
    #anlayis .ih-grid-4 > div > span:first-child > span {
      width: 26px !important;
      height: 26px !important;
    }
    #anlayis .ih-grid-4 h3 { margin: 10px 0 5px !important; font-size: 0.92rem !important; }
    #anlayis .ih-grid-4 p { font-size: 0.84rem !important; }

    /* ── 5. BRANŞ DERSLERİ ── */
    #branslar .ih-grid-4 {
      grid-template-columns: repeat(2, 1fr) !important;
      gap: 12px !important;
      margin-top: 24px !important;
    }

    /* ── 6. NEDEN İLK HECEM ── */
    #neden .ih-2col { gap: 20px !important; }
    .ih-grid-2 { grid-template-columns: repeat(2, 1fr) !important; gap: 12px !important; }

    /* ── 7. GALERİ ── */
    #galeri span[aria-hidden="true"] { display: none !important; }
    .ih-gallery {
      grid-template-columns: repeat(2, 1fr) !important;
      grid-auto-rows: 110px !important;
      gap: 8px !important;
      margin-top: 24px !important;
    }
    .ih-gallery > button {
      grid-column: span 1 !important;
      grid-row: span 1 !important;
    }

    /* ── 8. VELİ YORUMLARI ── */
    #yorumlar .ih-grid-3 {
      grid-template-columns: 1fr !important;
      gap: 12px !important;
      margin-top: 24px !important;
    }
    #yorumlar [style*="font-size: 22px"] { font-size: 18px !important; }
    #yorumlar [style*="font-size: 24px"] { font-size: 18px !important; }

    /* ── 9. SSS ── */
    #sss [style*="20px 24px"] { padding: 15px 16px !important; }
    #sss [style*="0 24px"] { padding: 0 16px 16px !important; }
    #sss [style*="1.1rem"] { font-size: 0.95rem !important; }

    /* ── 10. İLETİŞİM ── */
    #iletisim > div > span[aria-hidden="true"] { display: none !important; }
    #iletisim .ih-2col { gap: 20px !important; }
    #iletisim [style*="16px 20px"] { padding: 12px 14px !important; gap: 10px !important; }
    #iletisim [style*="clamp(24px"] { padding: 20px !important; }

    /* ── 11. FOOTER ── */
    .ih-footer-grid { grid-template-columns: 1fr !important; gap: 20px !important; }
    footer img[alt="İlk Hecem Anaokulu"] { height: 52px !important; margin-bottom: 10px !important; }

    /* ── 12. FLOATING WHATSAPP ── */
    a[aria-label="WhatsApp'tan yazın"] {
      width: 52px !important;
      height: 52px !important;
      right: 14px !important;
      bottom: 14px !important;
    }
    a[aria-label="WhatsApp'tan yazın"] > span:last-child {
      width: 28px !important;
      height: 28px !important;
    }
  }

  /* ── ÇOK KÜÇÜK EKRANLAR (≤ 390px) ── */
  @media (max-width: 390px) {
    :root {
      --fs-hero:    1.5rem;
      --fs-display: 1.28rem;
      --gutter:     14px;
    }
    .ih-hero-ctas > * { font-size: 0.78rem !important; padding-left: 8px !important; padding-right: 8px !important; }
  }

  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script src="bundle.js"></script>
</body>
</html>
